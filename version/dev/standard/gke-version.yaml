# ===================================================================
# GKEバージョン管理ファイル
#
# このファイルは、GKEアップグレード自動化の「ターゲットバージョン」を定義するために使用します。
#
# !! 注意 !!
# GKEコントロールプレーンの自動アップグレード（パッチ適用など）により、
# このファイルに記載されたバージョンと、GCPコンソール上の
# 「実機のバージョン」との間に一時的な差異が発生する可能性があります。
# ===================================================================
name: gke-version
cluster_name: test-tokyo-cluster
cluster_type: standard
location: asia-northeast1
control-plane:
  gke-version: 1.33.5-gke.11162000
# standardクラスタのみ設定 
node-pool:
  gke-version: 1.33.5-gke.1125000
